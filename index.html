<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocalSheet Premium</title>
  <!-- Load React and Dependencies -->
  <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
  <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
  <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    input[type="range"]::-webkit-slider-thumb { border-radius: 999px; }
  </style>
</head>
<body class="bg-[#f8faf9]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    
    // Replace with your actual Gemini API Key if hosting externally
    const apiKey = ""; 
    const TTS_MODEL = "gemini-2.5-flash-preview-tts";

    // Helper: Convert PCM16 to WAV
    function pcmToWav(pcmData, sampleRate) {
      const buffer = new ArrayBuffer(44 + pcmData.length * 2);
      const view = new DataView(buffer);
      const writeString = (offset, string) => {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 32 + pcmData.length * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, pcmData.length * 2, true);
      for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
      return new Blob([buffer], { type: 'audio/wav' });
    }

    function App() {
      // Spreadsheet Data
      const [grid, setGrid] = useState(Array(50).fill(null).map(() => Array(26).fill('')));
      const [styles, setStyles] = useState({}); 
      
      // Dimensions
      const [colWidths, setColWidths] = useState({}); 
      const [rowHeights, setRowHeights] = useState({}); 
      
      // Interaction State
      const [selection, setSelection] = useState({ start: null, end: null });
      const [isSelecting, setIsSelecting] = useState(false);
      const [editing, setEditing] = useState(null);
      const [resizing, setResizing] = useState(null); 

      // Audio/TTS State
      const [isPlaying, setIsPlaying] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [speed, setSpeed] = useState(1);
      const [isLoading, setIsLoading] = useState(false);
      const audioRef = useRef(null);

      // SVG Icons
      const Sparkles = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
      const Play = ({fill="none"}) => <svg width="14" height="14" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
      const Pause = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
      const RotateCcw = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
      const BoldIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>;
      const ItalicIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>;
      const AlignLeft = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>;
      const AlignCenter = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>;
      const AlignRight = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>;
      const Maximize = ({className}) => <svg className={className} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;

      useEffect(() => {
        audioRef.current = new Audio();
        audioRef.current.onended = () => { setIsPlaying(false); setIsPaused(false); };
        
        const handleGlobalMouseMove = (e) => {
          if (!resizing) return;
          const delta = resizing.type === 'col' ? e.pageX - resizing.startPos : e.pageY - resizing.startPos;
          const newDim = Math.max(30, resizing.startDim + delta);
          if (resizing.type === 'col') setColWidths(prev => ({ ...prev, [resizing.index]: newDim }));
          else setRowHeights(prev => ({ ...prev, [resizing.index]: newDim }));
        };

        const handleGlobalMouseUp = () => setResizing(null);
        window.addEventListener('mousemove', handleGlobalMouseMove);
        window.addEventListener('mouseup', handleGlobalMouseUp);
        return () => {
          window.removeEventListener('mousemove', handleGlobalMouseMove);
          window.removeEventListener('mouseup', handleGlobalMouseUp);
        };
      }, [resizing]);

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = speed;
      }, [speed]);

      const fetchTTS = async (text, retryCount = 0) => {
        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: `Read the following spreadsheet data: ${text}` }] }],
                generationConfig: {
                  responseModalities: ["AUDIO"],
                  speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                }
              })
            }
          );
          if (!response.ok) throw new Error('API Error');
          const data = await response.json();
          const audioPart = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
          if (!audioPart) throw new Error('No audio');
          const sampleRate = parseInt(audioPart.mimeType.match(/sampleRate=(\d+)/)?.[1] || "24000");
          const binaryString = atob(audioPart.data);
          const pcmData = new Int16Array(binaryString.length / 2);
          for (let i = 0; i < pcmData.length; i++) {
            pcmData[i] = binaryString.charCodeAt(i * 2) | (binaryString.charCodeAt(i * 2 + 1) << 8);
          }
          return pcmToWav(pcmData, sampleRate);
        } catch (error) {
          if (retryCount < 5) {
            await new Promise(r => setTimeout(r, Math.pow(2, retryCount) * 1000));
            return fetchTTS(text, retryCount + 1);
          }
          throw error;
        }
      };

      const handleVoiceOver = async () => {
        if (!selection.start || !selection.end) return;
        const rStart = Math.min(selection.start.r, selection.end.r);
        const rEnd = Math.max(selection.start.r, selection.end.r);
        const cStart = Math.min(selection.start.c, selection.end.c);
        const cEnd = Math.max(selection.start.c, selection.end.c);
        let textParts = [];
        for (let r = rStart; r <= rEnd; r++) {
          for (let c = cStart; c <= cEnd; c++) {
            if (grid[r]?.[c]?.trim()) textParts.push(grid[r][c]);
          }
        }
        const text = textParts.join('. ');
        if (!text) return;
        setIsLoading(true);
        try {
          const audioBlob = await fetchTTS(text);
          audioRef.current.src = URL.createObjectURL(audioBlob);
          audioRef.current.playbackRate = speed;
          audioRef.current.play();
          setIsPlaying(true);
          setIsPaused(false);
        } catch (e) { console.error(e); } finally { setIsLoading(false); }
      };

      const handlePaste = (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text');
        if (!text) return;
        const rows = text.split(/\r?\n/).filter(l => l.length > 0);
        const startR = selection.start?.r || 0;
        const startC = selection.start?.c || 0;
        let maxR = startR, maxC = startC;
        const matrix = rows.map((row, i) => {
          const cols = row.split('\t');
          maxR = Math.max(maxR, startR + i);
          maxC = Math.max(maxC, startC + cols.length - 1);
          return cols;
        });
        setGrid(prev => {
          const nr = Math.max(prev.length, maxR + 1);
          const nc = Math.max(prev[0].length, maxC + 1);
          const newGrid = Array(nr).fill(null).map((_, r) => {
            let row = prev[r] || Array(nc).fill('');
            row = row.length < nc ? [...row, ...Array(nc - row.length).fill('')] : [...row];
            if (r >= startR && r <= maxR) {
              matrix[r - startR].forEach((v, j) => { if (startC + j < nc) row[startC + j] = v.trim(); });
            }
            return row;
          });
          return newGrid;
        });
        setSelection({ start: { r: startR, c: startC }, end: { r: maxR, c: maxC } });
      };

      const getColLabel = (i) => {
        let l = '';
        while (i >= 0) { l = String.fromCharCode((i % 26) + 65) + l; i = Math.floor(i / 26) - 1; }
        return l;
      };

      return (
        <div className="flex flex-col h-screen bg-[#f1f5f2] text-slate-900 font-sans overflow-hidden">
          <header className="bg-white/80 backdrop-blur-md border-b border-emerald-100 px-6 py-3 flex items-center justify-between gap-4 z-30 shadow-sm">
            <div className="flex items-center gap-8">
              <div className="flex items-center gap-3 pr-6 border-r border-emerald-100">
                <div className="bg-emerald-600 p-2 rounded-lg text-white shadow-lg shadow-emerald-200/50 flex items-center justify-center">
                  <Sparkles />
                </div>
                <div>
                  <span className="font-extrabold text-xl text-emerald-900 tracking-tight leading-none block">VocalSheet</span>
                  <span className="text-[10px] font-bold text-emerald-600/60 uppercase tracking-widest mt-1 block">Premium Edition</span>
                </div>
              </div>
              <div className="flex items-center gap-1.5 bg-emerald-50/50 p-1 rounded-xl border border-emerald-100">
                <button onClick={() => applyStyleToSelection('bold', true)} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 transition-all"><BoldIcon /></button>
                <button onClick={() => applyStyleToSelection('italic', true)} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 transition-all"><ItalicIcon /></button>
                <div className="w-px h-5 bg-emerald-200 mx-1" />
                <button onClick={() => applyStyleToSelection('align', 'left')} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 transition-all"><AlignLeft /></button>
                <button onClick={() => applyStyleToSelection('align', 'center')} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 transition-all"><AlignCenter /></button>
                <button onClick={() => applyStyleToSelection('align', 'right')} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 transition-all"><AlignRight /></button>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-3 px-4 py-1.5 bg-emerald-50 rounded-full border border-emerald-100 shadow-inner">
                <div className="flex items-center gap-2 text-[10px] font-black text-emerald-700/60 uppercase tracking-tighter">SPEED</div>
                <input type="range" min="0.5" max="5" step="0.1" value={speed} onChange={e => setSpeed(parseFloat(e.target.value))} className="w-20 h-1.5 bg-emerald-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" />
                <span className="text-sm font-mono font-black text-emerald-700 w-10 text-center">{speed}x</span>
              </div>
              {!isPlaying ? (
                <button onClick={handleVoiceOver} disabled={isLoading || !selection.start} className="flex items-center gap-2 px-6 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded-full font-bold text-sm transition-all shadow-md active:scale-95">
                  {isLoading ? <div className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <Play fill="currentColor" />} Read
                </button>
              ) : (
                <div className="flex items-center gap-1.5 bg-emerald-600 p-1 rounded-full shadow-lg">
                  <button onClick={() => { if (isPaused) { audioRef.current.play(); setIsPaused(false); } else { audioRef.current.pause(); setIsPaused(true); } }} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors">{isPaused ? <Play fill="currentColor" /> : <Pause />}</button>
                  <button onClick={() => { audioRef.current.pause(); audioRef.current.currentTime = 0; setIsPlaying(false); setIsPaused(false); }} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors"><RotateCcw /></button>
                </div>
              )}
            </div>
          </header>
          <main className="flex-1 overflow-auto bg-[#f8faf9] relative p-6 custom-scrollbar" onMouseUp={() => setIsSelecting(false)} onPaste={handlePaste}>
            <div className="bg-white rounded-xl border border-emerald-100 shadow-xl inline-block min-w-full">
              <table className="border-collapse table-fixed min-w-full select-none">
                <thead>
                  <tr className="sticky top-0 z-20">
                    <th className="w-12 bg-emerald-50/50 border-r border-b border-emerald-100"></th>
                    {grid[0].map((_, c) => (
                      <th key={c} style={{ width: colWidths[c] || 140 }} className="bg-emerald-50/50 border-r border-b border-emerald-100 p-2 text-[11px] font-black text-emerald-700/60 uppercase relative group hover:bg-emerald-100/50 transition-colors">
                        {getColLabel(c)}
                        <div onMouseDown={(e) => { e.stopPropagation(); setResizing({ type: 'col', index: c, startPos: e.pageX, startDim: colWidths[c] || 140 }); }} className="absolute top-0 right-0 w-1.5 h-full cursor-col-resize group-hover:bg-emerald-300 transition-colors z-30" />
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {grid.map((row, r) => (
                    <tr key={r} style={{ height: rowHeights[r] || 38 }}>
                      <td className="sticky left-0 bg-emerald-50/50 border-r border-b border-emerald-100 text-center text-[10px] font-black text-emerald-700/40 relative group hover:bg-emerald-100/50 transition-colors z-10">
                        {r + 1}
                        <div onMouseDown={(e) => { e.stopPropagation(); setResizing({ type: 'row', index: r, startPos: e.pageY, startDim: rowHeights[r] || 38 }); }} className="absolute bottom-0 left-0 w-full h-1.5 cursor-row-resize group-hover:bg-emerald-300 transition-colors z-30" />
                      </td>
                      {row.map((cell, c) => {
                        const s = styles[`${r}-${c}`] || {};
                        const sel = selection.start && r >= Math.min(selection.start.r, selection.end.r) && r <= Math.max(selection.start.r, selection.end.r) && c >= Math.min(selection.start.c, selection.end.c) && c <= Math.max(selection.start.c, selection.end.c);
                        return (
                          <td key={c} onMouseDown={() => { setSelection({ start: { r, c }, end: { r, c } }); setIsSelecting(true); setEditing(null); }} onMouseEnter={() => isSelecting && setSelection(p => ({ ...p, end: { r, c } }))} onDoubleClick={() => { setEditing({ r, c }); setSelection({ start: { r, c }, end: { r, c } }); }} className={`border-r border-b border-emerald-50/50 p-0 relative transition-all ${sel ? 'bg-emerald-50/60 shadow-[inset_0_0_0_1px_#10b981]' : ''}`}>
                            {editing?.r === r && editing?.c === c ? (
                              <input autoFocus className="absolute inset-0 w-full h-full px-3 outline-none border-2 border-emerald-500 bg-white z-[5] text-emerald-900 font-medium" value={cell} onChange={(e) => { const n = [...grid]; n[r][c] = e.target.value; setGrid(n); }} onBlur={() => setEditing(null)} onKeyDown={(e) => e.key === 'Enter' && setEditing(null)} />
                            ) : (
                              <div style={{ fontWeight: s.bold ? 'bold' : 'normal', fontStyle: s.italic ? 'italic' : 'normal', textAlign: s.align || 'left' }} className="px-3 truncate w-full h-full flex items-center overflow-hidden text-slate-700 font-medium tracking-tight">{cell}</div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="p-8 text-center bg-emerald-50/20">
                <button onClick={() => {
                  setGrid(prev => {
                    const nr = prev.length + 50;
                    return [...prev, ...Array(50).fill(null).map(() => Array(prev[0].length).fill(''))];
                  });
                }} className="group px-6 py-2.5 text-[11px] text-emerald-700/60 hover:text-emerald-600 font-black uppercase tracking-[0.2em] flex items-center gap-3 mx-auto transition-all bg-white border border-emerald-100 rounded-full shadow-sm hover:shadow-md active:scale-95">
                  <Maximize className="group-hover:rotate-90 transition-transform duration-500" /> Load Extra Rows
                </button>
              </div>
            </div>
          </main>
          <footer className="bg-emerald-900 text-emerald-100 px-6 py-2 flex justify-between items-center text-[11px] font-bold uppercase tracking-wider">
            <div className="flex gap-8 items-center"><span className="opacity-80">System Live</span><span className="opacity-60">{grid.length}R × {grid[0].length}C Active Area</span></div>
            {selection.start && (
              <div className="bg-white/10 px-3 py-1 rounded-lg border border-white/10">
                {getColLabel(Math.min(selection.start.c, selection.end.c))}{Math.min(selection.start.r, selection.end.r) + 1} : {getColLabel(Math.max(selection.start.c, selection.end.c))}{Math.max(selection.start.r, selection.end.r) + 1}
              </div>
            )}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

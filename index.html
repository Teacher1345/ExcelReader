<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocalSheet Premium</title>
  <!-- Load React and Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    input[type="range"]::-webkit-slider-thumb { border-radius: 999px; }
    .cell-input { @apply absolute inset-0 w-full h-full px-3 outline-none border-2 border-emerald-600 bg-white z-[5] text-emerald-900 font-medium shadow-lg; }
    .spreadsheet-grid { border-right: 1px solid #d1d5db; border-bottom: 1px solid #d1d5db; }
    .spreadsheet-grid td, .spreadsheet-grid th { border-left: 1px solid #d1d5db; border-top: 1px solid #d1d5db; }
    .grid-focus-container:focus { outline: none; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-setup { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-[#f8faf9]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    
    const DEFAULT_API_KEY = "AIzaSyAoS3wC5pW4Ka6_3XN885zIi2uUemA7V2w"; 
    const TTS_MODEL = "gemini-2.5-flash-preview-tts";

    // Helper: Convert PCM16 to WAV
    function pcmToWav(pcmData, sampleRate) {
      const buffer = new ArrayBuffer(44 + pcmData.length * 2);
      const view = new DataView(buffer);
      const writeString = (offset, string) => {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 32 + pcmData.length * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, pcmData.length * 2, true);
      for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
      return new Blob([buffer], { type: 'audio/wav' });
    }

    function App() {
      const [grid, setGrid] = useState(Array(50).fill(null).map(() => Array(26).fill('')));
      const [styles, setStyles] = useState({}); 
      const [colWidths, setColWidths] = useState({}); 
      const [rowHeights, setRowHeights] = useState({}); 
      const [history, setHistory] = useState([]);
      const [redoStack, setRedoStack] = useState([]);
      const [selection, setSelection] = useState({ start: null, end: null });
      const [isSelecting, setIsSelecting] = useState(false);
      const [editing, setEditing] = useState(null);
      const [resizing, setResizing] = useState(null); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [speed, setSpeed] = useState(1);
      const [isLoading, setIsLoading] = useState(false);
      const [recognizedText, setRecognizedText] = useState("");
      
      // API Key Management
      const [runtimeApiKey, setRuntimeApiKey] = useState(DEFAULT_API_KEY);
      const [showSetup, setShowSetup] = useState(false);
      const [isSavingKey, setIsSavingKey] = useState(false);
      
      const audioRef = useRef(null);
      const gridRef = useRef(null);

      // Check for stored API key on startup (Google Apps Script environment)
      useEffect(() => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((key) => {
              if (key) {
                setRuntimeApiKey(key);
              } else if (!runtimeApiKey) {
                setShowSetup(true);
              }
            })
            .getStoredApiKey();
        } else {
          // If in preview/web mode, just check state
          if (!runtimeApiKey) setShowSetup(true);
        }
      }, []);

      const saveApiKeyAction = () => {
        if (!runtimeApiKey.trim()) return;
        setIsSavingKey(true);
        
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              setIsSavingKey(false);
              setShowSetup(false);
            })
            .saveApiKey(runtimeApiKey);
        } else {
          setIsSavingKey(false);
          setShowSetup(false);
        }
      };

      const pushToHistory = useCallback(() => {
        setHistory(prev => [...prev.slice(-49), { grid: JSON.parse(JSON.stringify(grid)), styles: { ...styles } }]);
        setRedoStack([]); 
      }, [grid, styles]);

      const undo = useCallback(() => {
        if (history.length === 0) return;
        const previous = history[history.length - 1];
        setRedoStack(prev => [...prev, { grid: JSON.parse(JSON.stringify(grid)), styles: { ...styles } }]);
        setGrid(previous.grid);
        setStyles(previous.styles);
        setHistory(prev => prev.slice(0, -1));
      }, [history, grid, styles]);

      const redo = useCallback(() => {
        if (redoStack.length === 0) return;
        const next = redoStack[redoStack.length - 1];
        setHistory(prev => [...prev, { grid: JSON.parse(JSON.stringify(grid)), styles: { ...styles } }]);
        setGrid(next.grid);
        setStyles(next.styles);
        setRedoStack(prev => prev.slice(0, -1));
      }, [redoStack, grid, styles]);

      // Optimized real-time text recognition
      const recognizeSelectionText = useCallback(() => {
        if (!selection.start || !selection.end) { setRecognizedText(""); return; }
        const rStart = Math.min(selection.start.r, selection.end.r);
        const rEnd = Math.max(selection.start.r, selection.end.r);
        const cStart = Math.min(selection.start.c, selection.end.c);
        const cEnd = Math.max(selection.start.c, selection.end.c);
        let parts = [];
        for (let r = rStart; r <= rEnd; r++) {
          for (let c = cStart; c <= cEnd; c++) {
            const val = grid[r]?.[c]?.trim();
            if (val) parts.push(val);
          }
        }
        setRecognizedText(parts.join('. '));
      }, [selection, grid]);

      // This now runs instantly as you drag, tracking selection changes immediately
      useEffect(() => { recognizeSelectionText(); }, [selection, grid, recognizeSelectionText]);

      const copyToClipboard = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      };

      const handleCopy = useCallback(() => {
        if (!selection.start || !selection.end) return;
        const rStart = Math.min(selection.start.r, selection.end.r);
        const rEnd = Math.max(selection.start.r, selection.end.r);
        const cStart = Math.min(selection.start.c, selection.end.c);
        const cEnd = Math.max(selection.start.c, selection.end.c);
        let textRows = [];
        for (let r = rStart; r <= rEnd; r++) {
          let rowCells = [];
          for (let c = cStart; c <= cEnd; c++) rowCells.push(grid[r][c]);
          textRows.push(rowCells.join('\t'));
        }
        copyToClipboard(textRows.join('\n'));
      }, [selection, grid]);

      const handleCut = () => {
        if (!selection.start) return;
        handleCopy();
        pushToHistory();
        const rMin = Math.min(selection.start.r, selection.end.r);
        const rMax = Math.max(selection.start.r, selection.end.r);
        const cMin = Math.min(selection.start.c, selection.end.c);
        const cMax = Math.max(selection.start.c, selection.end.c);
        setGrid(prev => {
          const next = prev.map(row => [...row]);
          for(let r=rMin; r<=rMax; r++) for(let c=cMin; c<=cMax; c++) next[r][c] = '';
          return next;
        });
      };

      const deleteRows = () => {
        if (!selection.start) return;
        pushToHistory();
        const rMin = Math.min(selection.start.r, selection.end.r);
        const rMax = Math.max(selection.start.r, selection.end.r);
        setGrid(prev => {
          const next = prev.filter((_, i) => i < rMin || i > rMax);
          while (next.length < prev.length) next.push(Array(prev[0].length).fill(''));
          return next;
        });
        setSelection({ start: null, end: null });
      };

      const deleteCols = () => {
        if (!selection.start) return;
        pushToHistory();
        const cMin = Math.min(selection.start.c, selection.end.c);
        const cMax = Math.max(selection.start.c, selection.end.c);
        setGrid(prev => prev.map(row => {
          const nextRow = row.filter((_, i) => i < cMin || i > cMax);
          while (nextRow.length < row.length) nextRow.push('');
          return nextRow;
        }));
        setSelection({ start: null, end: null });
      };

      const handleDoubleClick = (r, c) => {
        const content = grid[r][c];
        if (content) copyToClipboard(content);
        setEditing({ r, c });
        setSelection({ start: { r, c }, end: { r, c } });
      };

      const processAudioResponse = (base64Data, mimeType) => {
        const sampleRate = parseInt(mimeType.match(/sampleRate=(\d+)/)?.[1] || "24000");
        const binaryString = atob(base64Data);
        const pcmData = new Int16Array(binaryString.length / 2);
        for (let i = 0; i < pcmData.length; i++) {
          pcmData[i] = binaryString.charCodeAt(i * 2) | (binaryString.charCodeAt(i * 2 + 1) << 8);
        }
        audioRef.current.src = URL.createObjectURL(pcmToWav(pcmData, sampleRate));
        audioRef.current.playbackRate = speed;
        audioRef.current.play();
        setIsPlaying(true);
        setIsPaused(false);
      };

      const handleVoiceOver = async () => {
        const textToRead = recognizedText;
        if (!textToRead) return;
        
        if (!runtimeApiKey) {
          setShowSetup(true);
          return;
        }

        setIsLoading(true);

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((response) => {
              setIsLoading(false);
              if (response.success) {
                processAudioResponse(response.data, response.mimeType);
              } else {
                console.error("Server Error:", response.error);
                alert("Voice Error: Check if your API Key is active.");
                setShowSetup(true);
              }
            })
            .withFailureHandler((err) => {
              setIsLoading(false);
              console.error("Apps Script Error:", err);
              alert("Server connection failed. Ensure your Code.gs is correctly set up with fetchTTSFromServer.");
            })
            .fetchTTSFromServer(textToRead, runtimeApiKey);
          return;
        }

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${runtimeApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Read these spreadsheet values: ${textToRead}` }] }],
              generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } }
            })
          });
          const data = await response.json();
          if (data.error) throw new Error(data.error.message);
          const audioPart = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
          if (!audioPart) throw new Error('No Audio Content returned. Check your API usage limits.');
          processAudioResponse(audioPart.data, audioPart.mimeType);
        } catch (e) { 
          console.error(e);
          alert("TTS Failed: " + e.message + "\n\nTip: Click the Key icon to verify your API Key.");
        } finally { 
          setIsLoading(false); 
        }
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (editing || showSetup) return;
          if (!selection.start) return;
          if (e.altKey && e.key.toLowerCase() === 's') { e.preventDefault(); handleVoiceOver(); return; }
          
          if ((e.ctrlKey || e.metaKey) && e.key === 'z') { 
            e.preventDefault(); 
            if (e.shiftKey) redo(); else undo(); 
            return; 
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 'y') { 
            e.preventDefault(); 
            redo(); 
            return; 
          }

          if ((e.ctrlKey || e.metaKey) && e.key === 'c') { handleCopy(); return; }
          if ((e.ctrlKey || e.metaKey) && e.key === 'x') { handleCut(); return; }
          if (e.key === 'Delete' || e.key === 'Backspace') {
            pushToHistory();
            const rMin = Math.min(selection.start.r, selection.end.r), rMax = Math.max(selection.start.r, selection.end.r);
            const cMin = Math.min(selection.start.c, selection.end.c), cMax = Math.max(selection.start.c, selection.end.c);
            setGrid(prev => {
              const next = prev.map(row => [...row]);
              for(let r=rMin; r<=rMax; r++) for(let c=cMin; c<=cMax; c++) next[r][c] = '';
              return next;
            });
            return;
          }
          if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
            e.preventDefault(); pushToHistory();
            setEditing({ r: selection.start.r, c: selection.start.c });
            setGrid(prev => { const n = [...prev.map(row => [...row])]; n[selection.start.r][selection.start.c] = e.key; return n; });
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selection, editing, grid, showSetup, handleVoiceOver, recognizedText, handleCopy, undo, redo, pushToHistory]);

      useEffect(() => {
        audioRef.current = new Audio();
        audioRef.current.onended = () => { setIsPlaying(false); setIsPaused(false); };
        const mm = (e) => {
          if (!resizing) return;
          const delta = resizing.type === 'col' ? e.pageX - resizing.startPos : e.pageY - resizing.startPos;
          const dim = Math.max(30, resizing.startDim + delta);
          if (resizing.type === 'col') setColWidths(p => ({ ...p, [resizing.index]: dim }));
          else setRowHeights(p => ({ ...p, [resizing.index]: dim }));
        };
        const mu = () => setResizing(null);
        window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu);
        return () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
      }, [resizing]);

      const handlePaste = (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text');
        if (!text) return;
        pushToHistory();
        const rawRows = text.split(/\r?\n/);
        if (rawRows.length > 1 && rawRows[rawRows.length - 1].trim() === '') rawRows.pop();
        const startR = selection.start?.r || 0;
        const startC = selection.start?.c || 0;
        let maxR = startR, maxC = startC;
        const matrix = rawRows.map((row, i) => {
          const cols = row.split('\t');
          maxR = Math.max(maxR, startR + i);
          maxC = Math.max(maxC, startC + cols.length - 1);
          return cols;
        });
        setGrid(prev => {
          const nr = Math.max(prev.length, maxR + 1);
          const nc = Math.max(prev[0].length, maxC + 1);
          return Array(nr).fill(null).map((_, r) => {
            let curr = prev[r] || Array(nc).fill('');
            if (curr.length < nc) curr = [...curr, ...Array(nc - curr.length).fill('')];
            else curr = [...curr];
            if (r >= startR && r <= maxR) matrix[r-startR].forEach((v, j) => { if (startC+j < nc) curr[startC+j] = v.trim(); });
            return curr;
          });
        });
        setSelection({ start: { r: startR, c: startC }, end: { r: maxR, c: maxC } });
      };

      const getColLabel = (i) => { let l = ''; while (i >= 0) { l = String.fromCharCode((i % 26) + 65) + l; i = Math.floor(i / 26) - 1; } return l; };
      const applyStyle = (prop, val) => {
        if (!selection.start) return;
        pushToHistory();
        const rMin = Math.min(selection.start.r, selection.end.r), rMax = Math.max(selection.start.r, selection.end.r);
        const cMin = Math.min(selection.start.c, selection.end.c), cMax = Math.max(selection.start.c, selection.end.c);
        setStyles(prev => {
          const next = { ...prev };
          for (let r = rMin; r <= rMax; r++) for (let c = cMin; c <= cMax; c++) {
            const k = `${r}-${c}`;
            next[k] = { ...(next[k] || {}), [prop]: val === next[k]?.[prop] ? null : value };
          }
          return next;
        });
      };

      // Icons
      const Sparkles = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
      const PlayIcon = ({fill="none"}) => <svg width="14" height="14" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
      const PauseIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
      const RotateCcwIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
      const CutIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>;
      const KeyIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;

      return (
        <div className="flex flex-col h-screen bg-[#f1f5f2] text-slate-900 font-sans overflow-hidden">
          {/* API Key Setup Wizard Overlay */}
          {showSetup && (
            <div className="fixed inset-0 z-[100] bg-emerald-950/40 backdrop-blur-md flex items-center justify-center p-6">
              <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 border border-emerald-100 animate-setup">
                <div className="bg-emerald-100 w-16 h-16 rounded-2xl flex items-center justify-center text-emerald-600 mb-6 mx-auto">
                  <KeyIcon size={32} />
                </div>
                <h2 className="text-2xl font-black text-center text-slate-800 tracking-tight">Voice Setup Required</h2>
                <p className="text-slate-600 text-center text-sm mt-3 leading-relaxed">
                  To enable the high-speed Voice Over feature, you need a free Gemini API Key from Google AI Studio.
                </p>
                
                <div className="mt-8 space-y-4">
                  <a 
                    href="https://aistudio.google.com/app/apikey" 
                    target="_blank" 
                    className="flex items-center justify-center gap-2 w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-black transition-all"
                  >
                    Generate Free API Key <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  </a>
                  
                  <div className="relative">
                    <input 
                      type="password"
                      placeholder="Paste your API Key here"
                      className="w-full px-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl outline-none focus:ring-2 ring-emerald-500 text-sm font-mono"
                      value={runtimeApiKey}
                      onChange={(e) => setRuntimeApiKey(e.target.value)}
                    />
                  </div>
                  
                  <button 
                    onClick={saveApiKeyAction}
                    disabled={!runtimeApiKey || isSavingKey}
                    className="w-full py-4 bg-emerald-600 text-white rounded-xl font-black text-sm shadow-xl shadow-emerald-200 hover:bg-emerald-700 disabled:opacity-50 transition-all uppercase tracking-widest"
                  >
                    {isSavingKey ? "Saving..." : "Save & Activate Voice"}
                  </button>
                  <button onClick={() => setShowSetup(false)} className="w-full text-xs text-slate-400 font-bold hover:text-slate-600 transition-colors mt-2 uppercase">Cancel for now</button>
                </div>
                <p className="text-[10px] text-slate-400 text-center mt-6">
                  Your key is encoded and stored securely in your private Google Script environment.
                </p>
              </div>
            </div>
          )}

          <header className="bg-white/80 backdrop-blur-md border-b border-emerald-100 px-6 py-3 flex items-center justify-between gap-4 z-30 shadow-sm">
            <div className="flex items-center gap-8">
              <div className="flex items-center gap-3 pr-6 border-r border-emerald-100">
                <div className="bg-emerald-600 p-2 rounded-lg text-white shadow-lg shadow-emerald-200/50 flex items-center justify-center"><Sparkles /></div>
                <div>
                  <span className="font-extrabold text-xl text-emerald-900 tracking-tight leading-none block">VocalSheet</span>
                  <span className="text-[10px] font-bold text-emerald-600/60 uppercase tracking-widest mt-1 block">Full Control</span>
                </div>
              </div>
              
              <div className="flex items-center gap-1.5 bg-emerald-50/50 p-1 rounded-xl border border-emerald-100">
                <button onClick={undo} disabled={history.length === 0} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 disabled:opacity-30" title="Undo (Ctrl+Z)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
                <button onClick={redo} disabled={redoStack.length === 0} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 disabled:opacity-30" title="Redo (Ctrl+Y)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg></button>
                <div className="w-px h-5 bg-emerald-200 mx-1" />
                <button onClick={handleCut} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800" title="Cut (Ctrl+X)"><CutIcon /></button>
                <button onClick={handleCopy} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800" title="Copy (Ctrl+C)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                <div className="w-px h-5 bg-emerald-200 mx-1" />
                <button onClick={deleteRows} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 text-[10px] font-bold uppercase tracking-tighter">Del Rows</button>
                <button onClick={deleteCols} className="p-2 hover:bg-white hover:shadow-sm rounded-lg text-emerald-800 text-[10px] font-bold uppercase tracking-tighter">Del Cols</button>
              </div>
            </div>

            <div className="flex items-center gap-4">
              <div className="flex items-center gap-3 px-4 py-1.5 bg-emerald-50 rounded-full border border-emerald-100 shadow-inner">
                <div className="flex items-center gap-2 text-[10px] font-black text-emerald-700/60 uppercase tracking-tighter">SPEED</div>
                <input type="range" min="0.5" max="5" step="0.1" value={speed} onChange={e => setSpeed(parseFloat(e.target.value))} className="w-20 h-1.5 bg-emerald-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" />
                <span className="text-sm font-mono font-black text-emerald-700 w-10 text-center">{speed}x</span>
              </div>
              {!isPlaying ? (
                <button onClick={handleVoiceOver} disabled={isLoading || !recognizedText} className={`flex items-center gap-2 px-6 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded-full font-bold text-sm transition-all shadow-md active:scale-95 ${recognizedText ? 'animate-pulse ring-2 ring-emerald-300' : ''}`}>
                  {isLoading ? <div className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <PlayIcon fill="currentColor" />} {recognizedText ? 'Read Selection' : 'Select Text'}
                </button>
              ) : (
                <div className="flex items-center gap-1.5 bg-emerald-600 p-1 rounded-full shadow-lg">
                  <button onClick={() => { if (isPaused) { audioRef.current.play(); setIsPaused(false); } else { audioRef.current.pause(); setIsPaused(true); } }} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors">{isPaused ? <PlayIcon fill="currentColor" /> : <PauseIcon />}</button>
                  <button onClick={() => { audioRef.current.pause(); audioRef.current.currentTime = 0; setIsPlaying(false); setIsPaused(false); }} className="p-2 hover:bg-white/10 rounded-full text-white transition-colors"><RotateCcwIcon /></button>
                </div>
              )}
              <button onClick={() => setShowSetup(true)} className="p-2 text-slate-400 hover:text-emerald-600 transition-colors" title="Settings"><KeyIcon size={18}/></button>
            </div>
          </header>

          <main ref={gridRef} tabIndex="0" className="grid-focus-container flex-1 overflow-auto bg-[#f8faf9] relative p-6 custom-scrollbar" onMouseUp={() => setIsSelecting(false)} onPaste={handlePaste}>
            <div className="bg-white rounded-xl border border-gray-300 shadow-xl inline-block min-w-full">
              <table className="border-collapse table-fixed min-w-full select-none spreadsheet-grid">
                <thead>
                  <tr className="sticky top-0 z-20">
                    <th className="w-12 bg-emerald-50/80 border-gray-300 text-gray-500 font-bold text-[10px]"></th>
                    {grid[0].map((_, c) => (
                      <th key={c} style={{ width: colWidths[c] || 140 }} className="bg-emerald-50/80 p-2 text-[11px] font-black text-emerald-700/60 uppercase relative group hover:bg-emerald-100/50 transition-colors border-gray-300">
                        {getColLabel(c)}
                        <div onMouseDown={(e) => { e.stopPropagation(); setResizing({ type: 'col', index: c, startPos: e.pageX, startDim: colWidths[c] || 140 }); }} className="absolute top-0 right-0 w-1.5 h-full cursor-col-resize group-hover:bg-emerald-300 transition-colors z-30" />
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {grid.map((row, r) => (
                    <tr key={r} style={{ height: rowHeights[r] || 38 }}>
                      <td className="sticky left-0 bg-emerald-50/80 border-gray-300 text-center text-[10px] font-black text-emerald-700/40 relative group hover:bg-emerald-100/50 transition-colors z-10">
                        {r + 1}
                        <div onMouseDown={(e) => { e.stopPropagation(); setResizing({ type: 'row', index: r, startPos: e.pageY, startDim: rowHeights[r] || 38 }); }} className="absolute bottom-0 left-0 w-full h-1.5 cursor-row-resize group-hover:bg-emerald-300 transition-colors z-30" />
                      </td>
                      {row.map((cell, c) => {
                        const s = styles[`${r}-${c}`] || {};
                        const sel = selection.start && r >= Math.min(selection.start.r, selection.end.r) && r <= Math.max(selection.start.r, selection.end.r) && c >= Math.min(selection.start.c, selection.end.c) && c <= Math.max(selection.start.c, selection.end.c);
                        const isPrimary = selection.start && selection.start.r === r && selection.start.c === c;
                        
                        return (
                          <td 
                            key={c} 
                            onMouseDown={() => { setSelection({ start: { r, c }, end: { r, c } }); setIsSelecting(true); setEditing(null); if (gridRef.current) gridRef.current.focus(); }} 
                            onMouseEnter={() => isSelecting && setSelection(p => ({ ...p, end: { r, c } }))} 
                            onDoubleClick={() => handleDoubleClick(r, c)} 
                            className={`p-0 relative transition-all border-gray-300 ${sel ? 'bg-emerald-200/80 shadow-[inset_0_0_0_1px_rgba(16,185,129,0.3)]' : ''} ${isPrimary ? 'ring-2 ring-emerald-600 ring-inset bg-emerald-100 z-[1]' : ''}`}
                          >
                            {editing?.r === r && editing?.c === c ? (
                              <input 
                                autoFocus 
                                className="absolute inset-0 w-full h-full px-3 outline-none border-2 border-emerald-600 bg-white z-[5] text-emerald-900 font-medium shadow-md" 
                                value={cell} 
                                onChange={(e) => { const n = [...grid]; n[r][c] = e.target.value; setGrid(n); }} 
                                onBlur={() => setEditing(null)} 
                                onKeyDown={(e) => {
                                  if (e.key === 'Enter' || e.key === 'Escape') { setEditing(null); if (gridRef.current) gridRef.current.focus(); } 
                                }} 
                              />
                            ) : (
                              <div style={{ fontWeight: s.bold ? 'bold' : 'normal', fontStyle: s.italic ? 'italic' : 'normal', textAlign: s.align || 'left' }} className="px-3 truncate w-full h-full flex items-center overflow-hidden text-slate-700 font-medium tracking-tight">
                                {cell}
                              </div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </main>

          <footer className="bg-emerald-900 text-emerald-100 px-6 py-2 flex justify-between items-center text-[11px] font-bold uppercase tracking-wider">
            <div className="flex gap-8 items-center">
              <span className="opacity-80">System Live</span>
              <span className="opacity-60">{grid.length} Rows</span>
              <span className={runtimeApiKey ? "text-emerald-400 font-mono" : "text-amber-400 font-mono animate-pulse"}>
                {runtimeApiKey ? "Voice Enabled" : "⚠️ Voice Setup Required"}
              </span>
            </div>
            {selection.start && (
              <div className="bg-white/10 px-3 py-1 rounded-lg border border-white/10 font-mono text-[10px]">
                {getColLabel(Math.min(selection.start.c, selection.end.c))}{Math.min(selection.start.r, selection.end.r) + 1} : {getColLabel(Math.max(selection.start.c, selection.end.c))}{Math.max(selection.start.r, selection.end.r) + 1}
              </div>
            )}
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
